name: Deploy Crawler

on:
  push:
    branches:
      - main
    paths:
      - "crawler/**"
      - ".github/workflows/deploy-crawler.yml"
  workflow_dispatch:

concurrency:
  group: koyeb-crawler-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install Koyeb CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
          echo "$HOME/.koyeb/bin" >> "$GITHUB_PATH"

      - name: Redeploy crawler service
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_API_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$KOYEB_TOKEN"

          koyeb services redeploy crwal \
            --app silly-donnamarie \
            --token "$KOYEB_TOKEN" \
            --wait \
            --wait-timeout 15m

      - name: Health check crawler
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            http_code=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://silly-donnamarie-aiproject-41bab04f.koyeb.app/health" \
              --max-time 15 || true)

            echo "Health status: $http_code"

            if [ "$http_code" = "200" ]; then
              exit 0
            fi

            sleep 10
          done

          echo "Crawler health check failed after redeploy"
          exit 1
