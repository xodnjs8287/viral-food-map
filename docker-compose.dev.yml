services:
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_KAKAO_MAP_KEY: ${NEXT_PUBLIC_KAKAO_MAP_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CRAWLER_BASE_URL: ${NEXT_PUBLIC_CRAWLER_BASE_URL}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_KAKAO_MAP_KEY: ${NEXT_PUBLIC_KAKAO_MAP_KEY}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_CRAWLER_BASE_URL: ${NEXT_PUBLIC_CRAWLER_BASE_URL}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}

  crawler:
    build:
      context: ./crawler
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_CONTACT: ${VAPID_CONTACT}
      APP_ENV: ${APP_ENV:-development}
      TREND_THRESHOLD: ${TREND_THRESHOLD:-20}
      TREND_SCORE_THRESHOLD: ${TREND_SCORE_THRESHOLD:-25}
      TREND_RISING_SCORE_THRESHOLD: ${TREND_RISING_SCORE_THRESHOLD:-40}
      TREND_RISING_ACCELERATION_THRESHOLD: ${TREND_RISING_ACCELERATION_THRESHOLD:-100}
      CRAWL_INTERVAL_MINUTES: ${CRAWL_INTERVAL_MINUTES:-30}
      STORE_UPDATE_INTERVAL_MINUTES: ${STORE_UPDATE_INTERVAL_MINUTES:-60}
      DISCOVERY_INTERVAL_HOURS: ${DISCOVERY_INTERVAL_HOURS:-1}
      DISCOVERY_MIN_FREQUENCY: ${DISCOVERY_MIN_FREQUENCY:-3}
      DISCOVERY_MAX_NEW_KEYWORDS: ${DISCOVERY_MAX_NEW_KEYWORDS:-10}
      YOMECHU_ENRICH_INTERVAL_HOURS: ${YOMECHU_ENRICH_INTERVAL_HOURS:-4}
      YOMECHU_ENRICH_BATCH_SIZE: ${YOMECHU_ENRICH_BATCH_SIZE:-100}
